<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vigil - Dignity First Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #fff; margin: 0; padding: 0; }
        nav { background: #161b22; padding: 15px 30px; border-bottom: 1px solid #30363d; display: flex; gap: 20px; }
        nav a { color: #8b949e; text-decoration: none; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        nav a.active { color: #58a6ff; border-bottom: 2px solid #58a6ff; padding-bottom: 5px; }
        
        .container { padding: 40px; max-width: 900px; margin: 0 auto; }
        .page { display: none; }
        .page.active { display: block; }
        
        .handbook-card { background: #161b22; padding: 40px; border-radius: 16px; border: 1px solid #30363d; line-height: 1.8; }
        .right-item { border-left: 3px solid #3fb950; padding-left: 20px; margin: 20px 0; background: rgba(63, 185, 80, 0.05); padding-top: 10px; padding-bottom: 10px; }
        .amulet-confirm { border: 2px solid #58a6ff; padding: 20px; border-radius: 12px; text-align: center; margin-top: 30px; }
        .btn-tap { background: #58a6ff; color: #fff; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <a onclick="show('pro')" id="l-pro">PROFESSIONAL DASHBOARD</a>
    <a onclick="show('client')" id="l-client" class="active">CLIENT HANDBOOK</a>
</nav>

<div class="container">
    <div id="client" class="page active">
        <div class="handbook-card">
            <h1 id="hb-title" style="color:#58a6ff; margin-top:0;"></h1>
            <p id="hb-phil" style="font-style: italic; color:#8b949e;"></p>
            
            <h3 style="margin-top:40px;">Your Rights in the Sighted Program</h3>
            <div id="hb-rights"></div>

            <div class="amulet-confirm">
                <h4>📳 Simulate Amulet Response</h4>
                <p style="font-size:0.8em; color:#8b949e;">When you receive a message from your P.O., tap your ring to acknowledge.</p>
                <button class="btn-tap" onclick="tapRing()">[ DOUBLE TAP RING ]</button>
            </div>
        </div>
    </div>

    <div id="pro" class="page">
        <h2>Professional Dashboard</h2>
        <p>Switch back to this view for P.O. and Counselor tools.</p>
    </div>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('l-' + id).classList.add('active');
        if(id === 'client') loadHandbook();
    }

    async function loadHandbook() {
        const res = await fetch('http://localhost:8000/api/handbook/');
        const data = await res.json();
        document.getElementById('hb-title').innerText = data.title;
        document.getElementById('hb-phil').innerText = data.philosophy;
        document.getElementById('hb-rights').innerHTML = data.rights.map(r => `
            <div class="right-item">
                <strong>${r.split(':')[0]}</strong><br>
                <span style="color:#8b949e">${r.split(':')[1]}</span>
            </div>
        `).join('');
    }

    async function tapRing() {
        await fetch('http://localhost:8000/api/acknowledge/?message_id=MSG-101', {method:'POST'});
        alert("Amulet Feedback Sent: P.O. has been notified that you received the message.");
    }

    loadHandbook();
</script>
</body>
</html>
